    <main class="quiz-page">
      <section class="question-panel">
        <p class="question-text">
          4. Which of the following statements about taurine is most accurate?
        </p>
        <ul class="choices">
          <li>
            <button class="choice" type="button">
              <span class="choice-marker">A</span>
              <span class="choice-text"
                >Taurine is a powerful stimulant derived from bull bile that
                amplifies the effects of caffeine exponentially</span
              >
            </button>
          </li>
          <li>
            <button class="choice" type="button">
              <span class="choice-marker">B</span>
              <span class="choice-text"
                >Taurine is a synthetic steroid compound banned in professional
                sports but permitted in consumer beverages</span
              >
            </button>
          </li>
          <li>
            <button class="choice" type="button">
              <span class="choice-marker">C</span>
              <span class="choice-text"
                >Taurine is an amino acid naturally produced by the human body
                that plays a role in cardiovascular function, and the taurine
                in energy drinks is synthetically produced, not
                animal-derived</span
              >
            </button>
          </li>
          <li>
            <button class="choice" type="button">
              <span class="choice-marker">D</span>
              <span class="choice-text"
                >Taurine is an unregulated psychoactive compound with no
                studied effects on the human body</span
              >
            </button>
          </li>
        </ul>
        <div class="actions">
          <button class="next-btn" data-next="question5.html" type="button">
            NEXT &gt;
          </button>
