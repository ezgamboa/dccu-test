<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>DCCU Knowledge Evaluation - Question 1</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="brand">
        <img src="assets/DCCU_logo.png?v=3" alt="DCCU logo" />
        <div class="brand-text">
          <div class="dept">U.S. Department</div>
          <div>Comprehensive</div>
          <div>Consumption &amp; Usage</div>
        </div>
      </div>
      <div class="header-copy">
        <div>Alyssa Osborne</div>
        <div>Course 463728: "High Caffeine Content Products"</div>
        <strong>KNOWLEDGE EVALUATION</strong>
      </div>
    </header>

    <main class="quiz-page">
      <section class="question-panel">
        <p class="question-text">
          1. Which group of people originally cultivated and used guarana, and
          for what primary purposes?
        </p>
        <ul class="choices">
          <li>
            <button class="choice" type="button">
              <span class="choice-marker">A</span>
              <span class="choice-text"
                >The Sahel region of Africa, used by Tuareg nomads as a
                long-distance travel stimulant</span
              >
            </button>
          </li>
          <li>
            <button class="choice" type="button">
              <span class="choice-marker">B</span>
              <span class="choice-text"
                >The Amazon Basin of South America, used by Indigenous tribes
                like the Sateré-Mawé for endurance and medicinal purposes</span
              >
            </button>
          </li>
          <li>
            <button class="choice" type="button">
              <span class="choice-marker">C</span>
              <span class="choice-text"
                >The highlands of Ethiopia, used by farmers to extend working
                hours during harvest seasons</span
              >
            </button>
          </li>
          <li>
            <button class="choice" type="button">
              <span class="choice-marker">D</span>
              <span class="choice-text"
                >Southeast Asia, used by Buddhist monks to sustain alertness
                during prolonged meditation</span
              >
            </button>
          </li>
        </ul>
        <div class="actions">
          <button class="next-btn" data-next="question2.html" type="button">
            NEXT &gt;
          </button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
    <script src="notebook-notes.js"></script>
  </body>
